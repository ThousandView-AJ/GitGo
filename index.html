<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Profile Explorer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>GitHub Profile Explorer</h1>

    <div class="search-box">
      <input type="text" id="username-input" placeholder="Enter GitHub username" />
      <button id="search-btn">Search</button>
    </div>

    <p id="error-msg" class="error hidden">User not found.</p>
    <p id="loading-msg" class="hidden">Loading...</p>

    <div id="profile-card" class="profile-card hidden">
      <img id="avatar" src="" alt="avatar" />
      <h2 id="name"></h2>
      <p id="bio"></p>
      <p>Followers: <span id="followers"></span></p>
      <p>Public Repos: <span id="repos-count"></span></p>
    </div>

    <div id="repos-grid" class="repos-grid"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
